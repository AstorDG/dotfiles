# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here. For a full list, see the wiki

################
### MONITORS ###
################

# My current monitor config
monitor = DP-2, 3440x1440@179.99Hz, 0x0, 1, vrr, 1, cm, srgb
# This is just a default line so that if I plug in another monitor hyprland still works
monitor = , preferred, auto, 1

###################
### MY PROGRAMS ###
###################
$terminal = ghostty
$fileManager = dolphin
$reloadWaybar = pkill waybar; waybar &
$browser = zen-browser
$music = spotify-launcher

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
exec-once = hyprpaper & waybar
exec-once = [workspace 1 silent] $terminal
exec-once = [workspace 2 silent] $browser
exec-once = [workspace 3 silent] obsidian
exec-once = [workspace 3 silent] $music

#############################
### ENVIRONMENT VARIABLES ###
#############################

# Cursor size
env = XCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################

general {
	border_size = 3
	gaps_in = 5
	gaps_out = 5

	col.active_border = rgba(217,2,1,1.0) rgba(114,1,2,1.0) 45deg
    col.inactive_border = rgba(100,100,100,1.0)

	layout = scrolling

	snap {
		enabled = false
		respect_gaps = true
	}
}

decoration {
	rounding = 25
	rounding_power = 3

	active_opacity = .9
	inactive_opacity = .9
	fullscreen_opacity = 1
	border_part_of_window = false

	blur {
		enabled = true
		size = 4
		passes = 2
		noise = 0
		contrast = 1.5
		vibrancy = 0.5
		vibrancy_darkness = 0.5
		popups = true
	}
}

scrolling {
	column_width = 0.333
	focus_fit_method = 1
	explicit_column_widths = 0.2, 0.333, 0.4, 0.5, 0.6, 0.667, 0.75, 1.0

}

animations {
    enabled = yes, please :)

	bezier = easeInOutBackDown, 0.885, -0.48, 0.272, 1.396
	bezier = easeOutBack, 0.34, 1.56, 0.64, 1.0

	# Animations
	animation = global, 1, 1.0, easeOutBack
	animation = windows, 1, 2.0, easeInOutBackDown, popin
	animation = windowsIn, 1, 2.5, easeInOutBackDown, gnomed
	animation = windowsOut, 1, 2.5, easeInOutBackDown, gnomed
	animation = windowsMove, 1, 2.5, easeInOutBackDown, gnomed
	animation = layers, 1, 2.5, easeInOutBackDown, popin
	animation = layersIn, 1, 2.5, easeInOutBackDown, popin
	animation = layersOut, 1, 2.5, easeInOutBackDown, popin
	animation = workspaces, 1, 2.0, easeInOutBackDown, slidevert
	animation = workspacesIn, 1, 2.0, easeInOutBackDown, slidevert
	animation = workspacesOut, 1, 2.0, easeInOutBackDown, slidevert
}

input {
	kb_layout = us

	#key repeats per second
	repeat_rate = 50
	#delay before keys repeat. Helpful to not double input keys
	repeat_delay = 250

	# Cursor and keyboard focus are divorced
    follow_mouse = 3
}

cursor {
	no_warps = 1
	warp_on_change_workspace = 1
}

misc {
	font_family = MonoidNerdFont-Regular.ttf
	vrr = 1
	focus_on_activate = 1
	disable_splash_rendering = 1
	animate_manual_resizes = 1
	animate_mouse_windowdragging = 1
}


dwindle {
	pseudotile = true
	preserve_split = true
}

master {
    new_status = master
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier
$subMod = CTRL

#open and close apps
bind = $mainMod, T, exec, $terminal
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, R, exec, $reloadWaybar
bind = $mainMod, M, exec, $music
bind = $mainMod, B, exec, $browser
# use forcekillactive to close end the process
bind = $mainMod, Q, forcekillactive,
bind = $subMod, SPACE, exec, pkill rofi || rofi -show run


#Music control
bind = , F7, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , F8, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , F9, exec, playerctl --player=spotify previous
bind = , F10, exec, playerctl --player=spotify play-pause
bind = , F11, exec, playerctl --player=spotify next

#screen shot 
bind = ,F12, exec, hyprshot -m region -o ~/screen-shots/

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Move betwen windows
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move windows around a workspace
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, L, layoutmsg, swapcol r
bind = $mainMod SHIFT, H, layoutmsg, swapcol l

# Resize windows
bind = $mainMod $subMod, H, layoutmsg, colresize -conf
bind = $mainMod $subMod, L, layoutmsg, colresize +conf

# I want a keybind that allows me to center the current window in the scrolling layout

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*

source = /home/winston/.config/hypr/hyprland-gui.conf
